<header class="app-header">
  <span class="logo">🌿 CarbonChain</span>
  <nav>
    <a routerLink="/dashboard">{{ 'nav.dashboard' | translate }}</a>
    <a routerLink="/marketplace">{{ 'nav.marketplace' | translate }}</a>
    <a routerLink="/retire">{{ 'nav.retire' | translate }}</a>
  </nav>
  <app-locale-switcher />
  <button class="theme-toggle" (click)="theme.toggle()" [attr.aria-label]="theme.isDark() ? 'Switch to light mode' : 'Switch to dark mode'">
    {{ theme.icon() }}
  </button>
  <app-connect-wallet />
</header>

<main>
  <router-outlet />
</main>
