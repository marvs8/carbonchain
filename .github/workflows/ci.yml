name: CarbonChain CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contracts:
    name: Smart Contracts (Soroban)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.81.0
        with:
          targets: wasm32-unknown-unknown
      # #47 — cache cargo registry and build artifacts for all four contracts
      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Build Contracts
        run: cd contracts && cargo build --target wasm32-unknown-unknown
      # #47 — run tests for all four contracts (credit_registry, retirement, marketplace, mrv_oracle)
      - name: Run Contract Tests
        run: cd contracts && cargo test --workspace

  api:
    name: Backend API (NestJS)
    runs-on: ubuntu-latest
    # #48 — PostgreSQL service container for e2e tests
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: carbonchain
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: api/package-lock.json
      - name: Install Dependencies
        run: cd api && npm ci --legacy-peer-deps
      - name: Lint
        run: cd api && npm run lint
      - name: Build
        run: cd api && npm run build
      # #48 — run unit tests
      - name: Run Unit Tests
        run: cd api && npm run test
      # #48 — run e2e tests with postgres available
      - name: Run E2E Tests
        run: cd api && npm run test:e2e
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/carbonchain
          JWT_SECRET: ci-test-secret
          ADMIN_SECRET_KEY: SCI7YTM2J5ZQOQ4SI5L5ZCXZDTXSMONGDFFHGQCPWAP6CCRBPYRCIATS
          STELLAR_NETWORK: testnet
          STELLAR_HORIZON_URL: https://horizon-testnet.stellar.org
          STELLAR_SOROBAN_RPC: https://soroban-testnet.stellar.org

  deploy:
    name: Testnet Deploy + Smoke Tests
    runs-on: ubuntu-latest
    needs: [contracts, api]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: testnet
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts
      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli@26.1.0 --features opt
      - name: Deploy contracts & run smoke tests
        env:
          ADMIN_SECRET_KEY: ${{ secrets.TESTNET_ADMIN_SECRET_KEY }}
        run: |
          chmod +x scripts/deploy-testnet.sh scripts/smoke-test.sh
          ./scripts/deploy-testnet.sh
      - name: Upload contract IDs
        uses: actions/upload-artifact@v4
        with:
          name: contract-ids-testnet
          path: scripts/contract-ids.testnet.json

  security:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        run: |-
          cd contracts && cargo audit --deny warnings \
            --ignore RUSTSEC-2026-0009 \
            --ignore RUSTSEC-2024-0436 \
            --ignore RUSTSEC-2026-0097

  frontend:
    name: Frontend SPA (Angular)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install Dependencies
        run: cd frontend && npm ci --legacy-peer-deps
      - name: Build
        run: cd frontend && npm run build
      - name: Run Tests
        run: cd frontend && npm run test:ci
