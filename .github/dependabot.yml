version: 2
updates:
  # Soroban / Rust contracts
  - package-ecosystem: "cargo"
    directory: "/contracts"
    schedule:
      interval: "weekly"
      day: "monday"
    reviewers:
      - "carbonchain/maintainers"
    labels:
      - "dependencies"
      - "infrastructure"

  # NestJS API
  - package-ecosystem: "npm"
    directory: "/api"
    schedule:
      interval: "weekly"
      day: "monday"
    reviewers:
      - "carbonchain/maintainers"
    labels:
      - "dependencies"
      - "infrastructure"

  # Angular frontend
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    reviewers:
      - "carbonchain/maintainers"
    labels:
      - "dependencies"
      - "infrastructure"
